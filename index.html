<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky 777 Slot Machine</title>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: radial-gradient(ellipse at 50% 25%, #1e0a3e 0%, #0a0a1e 55%, #050510 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', Impact, Arial, sans-serif;
        }

        /* ── Machine frame ────────────────────────────────────────── */
        .machine {
            background: linear-gradient(165deg, #18183c 0%, #0d0d22 100%);
            border: 3px solid #b8860b;
            border-radius: 28px;
            padding: 28px 28px 22px;
            width: 440px;
            box-shadow:
                0 0 0 1px #3a3a0a,
                0 0 45px rgba(184,134,11,.35),
                0 0 110px rgba(184,134,11,.10),
                inset 0 0 40px rgba(184,134,11,.05);
        }

        /* ── Title ────────────────────────────────────────────────── */
        .title-area { text-align: center; margin-bottom: 20px; }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 8px;
            text-shadow: 0 0 10px #ffd700, 0 0 26px #ffa500, 0 0 55px #ff5500;
            line-height: 1;
        }

        .subtitle {
            color: #6a5a18;
            font-size: .62rem;
            letter-spacing: 4px;
            margin-top: 5px;
            font-weight: normal;
        }

        /* ── Credits bar ──────────────────────────────────────────── */
        .credits-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #06060f;
            border: 1px solid #1a1a30;
            border-radius: 8px;
            padding: 8px 14px;
            margin-bottom: 20px;
        }

        .credits-label { color: #3a3a5a; font-size: .62rem; letter-spacing: 3px; font-weight: normal; }

        .credits-value {
            color: #00ff99;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff99;
            letter-spacing: 2px;
            transition: transform .12s;
        }

        .credits-value.bump { transform: scale(1.15); }

        /* ── Reels ────────────────────────────────────────────────── */
        .reels-outer { position: relative; margin-bottom: 20px; }

        .reels-frame {
            display: flex;
            gap: 8px;
            background: #04040c;
            border: 2px solid #16162e;
            border-radius: 14px;
            padding: 10px;
        }

        .reel {
            flex: 1;
            height: 240px;
            overflow: hidden;
            border-radius: 8px;
            background: #070712;
            border: 1px solid #18182e;
            position: relative;
        }

        .cell {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.65rem;
            position: relative;
        }

        .cell::after {
            content: '';
            position: absolute;
            bottom: 0; left: 8%; right: 8%;
            height: 1px;
            background: #101022;
        }

        .cell.middle-cell { background: rgba(255,215,0,.035); }

        .cell.winning { animation: cell-win .45s ease infinite alternate; }

        @keyframes cell-win {
            from { background: rgba(255,200,0,.07); }
            to   { background: rgba(255,200,0,.28); box-shadow: inset 0 0 20px rgba(255,200,0,.15); }
        }

        /* 777 symbol */
        .s777 {
            font-family: Impact, 'Arial Black', sans-serif;
            font-size: 1.75rem;
            font-weight: 900;
            color: #ff1a00;
            text-shadow: 0 0 6px #ff4400, 0 0 16px #ff0000;
            letter-spacing: -1px;
        }

        /* Win-line arrows */
        .win-line {
            position: absolute;
            left: -7px; right: -7px;
            top: 50%; transform: translateY(-50%);
            display: flex;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        .wl-arrow {
            width: 0; height: 0;
            flex-shrink: 0;
        }

        .wl-left {
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-right: 9px solid #cc2222;
            filter: drop-shadow(0 0 4px #ff3333);
        }

        .wl-right {
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 9px solid #cc2222;
            filter: drop-shadow(0 0 4px #ff3333);
        }

        .wl-bar {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, #ff3333 0%, #ff6666 50%, #ff3333 100%);
            box-shadow: 0 0 6px #ff3333;
            opacity: .55;
        }

        /* Spin animation classes */
        .reel.spinning .cell { filter: blur(1.8px); }

        .reel.landing { animation: land-bounce .18s ease-out; }

        @keyframes land-bounce {
            0%   { transform: translateY(-7px); }
            55%  { transform: translateY(4px);  }
            100% { transform: translateY(0);    }
        }

        /* ── Bet section ──────────────────────────────────────────── */
        .bet-section { margin-bottom: 14px; }

        .ctrl-label {
            text-align: center;
            color: #3a3a5a;
            font-size: .6rem;
            letter-spacing: 3px;
            font-weight: normal;
            margin-bottom: 8px;
        }

        .bet-group { display: flex; gap: 8px; }

        .bet-btn {
            flex: 1;
            background: #08081e;
            border: 2px solid #1a1a3e;
            color: #33337a;
            border-radius: 8px;
            padding: 9px 0;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all .18s;
            font-family: 'Arial Black', Arial, sans-serif;
        }

        .bet-btn:hover:not(.active) { border-color: #38388a; color: #6666aa; }

        .bet-btn.active {
            background: #121240;
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 14px rgba(255,215,0,.22);
        }

        /* ── Spin button ──────────────────────────────────────────── */
        .spin-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(155deg, #c60000 0%, #880000 100%);
            border: 2px solid #e03030;
            border-radius: 14px;
            color: #fff;
            font-size: 1.65rem;
            font-weight: 900;
            letter-spacing: 5px;
            cursor: pointer;
            font-family: 'Arial Black', Impact, Arial, sans-serif;
            text-shadow: 0 2px 5px rgba(0,0,0,.7);
            box-shadow: 0 4px 22px rgba(200,0,0,.38), inset 0 1px 0 rgba(255,80,80,.18);
            transition: all .15s;
            margin-bottom: 12px;
        }

        .spin-btn:hover:not(:disabled) {
            background: linear-gradient(155deg, #e60000 0%, #aa0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 7px 30px rgba(200,0,0,.5), inset 0 1px 0 rgba(255,80,80,.2);
        }

        .spin-btn:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 2px 10px rgba(200,0,0,.3); }
        .spin-btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

        /* ── Result area ──────────────────────────────────────────── */
        .result-area {
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }

        .result-msg {
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        .result-msg.jackpot {
            color: #ffd700;
            font-size: 1.15rem;
            animation: jackpot-glow .32s ease infinite alternate;
        }

        @keyframes jackpot-glow {
            from { text-shadow: 0 0 8px #ffd700, 0 0 18px #ffa500; }
            to   { text-shadow: 0 0 18px #ffd700, 0 0 36px #ff7700, 0 0 56px #ff4400; }
        }

        .result-msg.win  { color: #00ff99; text-shadow: 0 0 8px #00cc77; }
        .result-msg.lose { color: #3a3a5a; font-size: .85rem; letter-spacing: 1px; }

        /* ── Payout table ─────────────────────────────────────────── */
        .payout-table { border-top: 1px solid #101028; padding-top: 12px; }

        .payout-title {
            text-align: center;
            color: #2e2e4e;
            font-size: .58rem;
            letter-spacing: 4px;
            margin-bottom: 8px;
            font-weight: normal;
        }

        .payout-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 2px;
            border-bottom: 1px solid #0a0a1a;
        }

        .payout-sym {
            color: #888;
            font-size: .8rem;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .s777-sm {
            color: #e02200;
            font-weight: 900;
            font-size: .75rem;
            font-family: Impact, sans-serif;
            letter-spacing: 0;
        }

        .payout-val { font-size: .78rem; font-weight: bold; letter-spacing: .5px; }
        .pv-jackpot { color: #ffd700; }
        .pv-high    { color: #00ddff; }
        .pv-med     { color: #00ee88; }
        .pv-low     { color: #778877; }

        /* ── Bonus game overlay ───────────────────────────────────── */
        .bonus-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.82);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .bonus-overlay.active { display: flex; }

        .bonus-modal {
            background: linear-gradient(165deg, #1a0a30 0%, #0d0d22 100%);
            border: 3px solid #b8860b;
            border-radius: 24px;
            padding: 32px 36px 28px;
            width: 360px;
            text-align: center;
            box-shadow: 0 0 60px rgba(184,134,11,.45), 0 0 120px rgba(184,134,11,.12);
        }

        .bonus-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 5px;
            text-shadow: 0 0 12px #ffd700, 0 0 28px #ffa500;
            margin-bottom: 6px;
        }

        .bonus-subtitle {
            color: #5a4a18;
            font-size: .6rem;
            letter-spacing: 3px;
            font-weight: normal;
            margin-bottom: 24px;
        }

        .bonus-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 22px;
        }

        .bonus-card {
            background: #06060f;
            border: 1px solid #1a1a3a;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bonus-card-label {
            color: #3a3a6a;
            font-size: .58rem;
            letter-spacing: 3px;
            font-weight: normal;
        }

        .bonus-card-num {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            min-width: 80px;
            text-align: right;
            transition: all .3s;
        }

        .bonus-card-num.hidden-num {
            color: #222244;
            text-shadow: none;
        }

        .bonus-card-num.sys-num {
            color: #00ddff;
            text-shadow: 0 0 10px #00aaff;
        }

        .bonus-card-num.player-num {
            color: #ffd700;
            text-shadow: 0 0 10px #ffa500;
        }

        .bonus-separator {
            color: #3a3a5a;
            font-size: .7rem;
            letter-spacing: 8px;
            font-weight: normal;
        }

        .bonus-result-area {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .bonus-result-msg {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .bonus-result-msg.bonus-win {
            color: #ffd700;
            animation: jackpot-glow .32s ease infinite alternate;
        }

        .bonus-result-msg.bonus-lose {
            color: #4a4a6a;
            font-size: .9rem;
        }

        .bonus-draw-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(155deg, #006622 0%, #004414 100%);
            border: 2px solid #00aa44;
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            cursor: pointer;
            font-family: 'Arial Black', Impact, Arial, sans-serif;
            text-shadow: 0 2px 4px rgba(0,0,0,.6);
            box-shadow: 0 4px 18px rgba(0,180,60,.3);
            transition: all .15s;
            margin-bottom: 10px;
        }

        .bonus-draw-btn:hover:not(:disabled) {
            background: linear-gradient(155deg, #008833 0%, #005520 100%);
            transform: translateY(-2px);
        }

        .bonus-draw-btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

        .bonus-close-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #3a3a6a;
            font-size: .85rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            font-family: 'Arial Black', Arial, sans-serif;
            transition: all .15s;
            display: none;
        }

        .bonus-close-btn.visible { display: block; }
        .bonus-close-btn:hover { border-color: #5a5a8a; color: #6a6aaa; }
    </style>
</head>
<body>

<div class="machine">

    <div class="title-area">
        <div class="title">LUCKY 777</div>
        <div class="subtitle">— CLASSIC SLOT MACHINE —</div>
    </div>

    <div class="credits-bar">
        <span class="credits-label">CREDITS</span>
        <span class="credits-value" id="credits">1000</span>
    </div>

    <div class="reels-outer">
        <div class="reels-frame">
            <div class="reel" id="reel-0">
                <div class="cell"        id="c-0-0"></div>
                <div class="cell middle-cell" id="c-0-1"></div>
                <div class="cell"        id="c-0-2"></div>
            </div>
            <div class="reel" id="reel-1">
                <div class="cell"        id="c-1-0"></div>
                <div class="cell middle-cell" id="c-1-1"></div>
                <div class="cell"        id="c-1-2"></div>
            </div>
            <div class="reel" id="reel-2">
                <div class="cell"        id="c-2-0"></div>
                <div class="cell middle-cell" id="c-2-1"></div>
                <div class="cell"        id="c-2-2"></div>
            </div>
        </div>
        <div class="win-line">
            <div class="wl-arrow wl-left"></div>
            <div class="wl-bar"></div>
            <div class="wl-arrow wl-right"></div>
        </div>
    </div>

    <div class="bet-section">
        <div class="ctrl-label">CHOOSE BET</div>
        <div class="bet-group">
            <button class="bet-btn active" data-bet="50">50</button>
            <button class="bet-btn" data-bet="100">100</button>
            <button class="bet-btn" data-bet="200">200</button>
        </div>
    </div>

    <button class="spin-btn" id="spin-btn">SPIN</button>

    <div class="result-area">
        <div class="result-msg" id="result-msg"></div>
    </div>

    <div class="payout-table">
        <div class="payout-title">— PAYTABLE —</div>
        <div class="payout-row">
            <div class="payout-sym"><span class="s777-sm">777&nbsp;&nbsp;777&nbsp;&nbsp;777</span></div>
            <div class="payout-val pv-jackpot">+300 點（固定）</div>
        </div>
        <div class="payout-row">
            <div class="payout-sym">💎 💎 💎</div>
            <div class="payout-val pv-high">押注 × 4</div>
        </div>
        <div class="payout-row">
            <div class="payout-sym">⭐ ⭐ ⭐</div>
            <div class="payout-val pv-med">押注 × 3</div>
        </div>
        <div class="payout-row">
            <div class="payout-sym">🔔 🔔 🔔</div>
            <div class="payout-val pv-med">押注 × 2</div>
        </div>
        <div class="payout-row">
            <div class="payout-sym">🍒 🍒 🍒</div>
            <div class="payout-val pv-med">押注 × 1.5</div>
        </div>
        <div class="payout-row">
            <div class="payout-sym">🍋 🍋 🍋</div>
            <div class="payout-val pv-low">押注 × 1</div>
        </div>
    </div>

</div>

<!-- Bonus Game Overlay -->
<div class="bonus-overlay" id="bonus-overlay">
    <div class="bonus-modal">
        <div class="bonus-title">BONUS ROUND</div>
        <div class="bonus-subtitle">— 比大小挑戰 —</div>

        <div class="bonus-cards">
            <div class="bonus-card">
                <span class="bonus-card-label">SYSTEM<br>系統 (1–100)</span>
                <span class="bonus-card-num hidden-num" id="bonus-sys-num">???</span>
            </div>
            <div class="bonus-separator">VS</div>
            <div class="bonus-card">
                <span class="bonus-card-label">PLAYER<br>玩家 (1–100)</span>
                <span class="bonus-card-num hidden-num" id="bonus-player-num">???</span>
            </div>
        </div>

        <div class="bonus-result-area">
            <div class="bonus-result-msg" id="bonus-result-msg"></div>
        </div>

        <button class="bonus-draw-btn" id="bonus-draw-btn">DRAW 抽牌</button>
        <button class="bonus-close-btn" id="bonus-close-btn">返回遊戲</button>
    </div>
</div>

<script>
'use strict';

/* ── Symbol data ───────────────────────────────────────────────────────── */
const SYM = {
    seven:   { html: '<span class="s777">777</span>', emoji: '7️⃣', weight: 0  },
    diamond: { html: '💎', emoji: '💎', weight: 5  },
    star:    { html: '⭐', emoji: '⭐', weight: 10 },
    bell:    { html: '🔔', emoji: '🔔', weight: 20 },
    cherry:  { html: '🍒', emoji: '🍒', weight: 35 },
    lemon:   { html: '🍋', emoji: '🍋', weight: 30 },
};

const ALL_IDS    = Object.keys(SYM);
const NORM_IDS   = ALL_IDS.filter(id => id !== 'seven');

// Net gain multiplier (×bet) for non-777 3-of-a-kind
const NET_MULT = { diamond: 4, star: 3, bell: 2, cherry: 1.5, lemon: 1 };

/* ── Game state ────────────────────────────────────────────────────────── */
let credits  = 1000;
let bet      = 50;
let spinning = false;
const ivals  = [null, null, null];

/* ── Utilities ─────────────────────────────────────────────────────────── */
function weightedRandom(ids) {
    const total = ids.reduce((s, id) => s + SYM[id].weight, 0);
    let r = Math.random() * total;
    for (const id of ids) { r -= SYM[id].weight; if (r <= 0) return id; }
    return ids.at(-1);
}

const randNorm = () => weightedRandom(NORM_IDS);
const randAny  = () => Math.random() < 0.06 ? 'seven' : randNorm();

/* ── DOM helpers ───────────────────────────────────────────────────────── */
const $  = id => document.getElementById(id);
const cellEl = (col, row) => $(`c-${col}-${row}`);

function setCell(col, row, id) {
    cellEl(col, row).innerHTML = SYM[id].html;
}

function setCredits(v) {
    credits = v;
    const el = $('credits');
    el.textContent = v;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 160);
}

function showResult(msg, cls) {
    const el = $('result-msg');
    el.textContent = msg;
    el.className   = 'result-msg ' + cls;
}

function setWinHighlight(on) {
    for (let c = 0; c < 3; c++) cellEl(c, 1).classList.toggle('winning', on);
}

/* ── Spin ──────────────────────────────────────────────────────────────── */
function spin() {
    if (spinning) return;
    if (credits < bet) { showResult('點數不足！請降低押注', 'lose'); return; }

    spinning = true;
    setCredits(credits - bet);
    $('result-msg').className = 'result-msg';
    $('result-msg').textContent = '';
    setWinHighlight(false);
    $('spin-btn').disabled = true;

    // Determine result
    const jackpot = Math.random() < 0.20;
    const mid = jackpot
        ? ['seven', 'seven', 'seven']
        : [randNorm(), randNorm(), randNorm()];

    // Full grid [col][row=0 top, 1 mid, 2 bot]
    const grid = [0, 1, 2].map(c => [randAny(), mid[c], randAny()]);

    // Start rapid cycling on all reels
    for (let c = 0; c < 3; c++) {
        $(`reel-${c}`).classList.add('spinning');
        const col = c;
        ivals[col] = setInterval(() => {
            setCell(col, 0, randNorm());
            setCell(col, 1, randNorm());
            setCell(col, 2, randNorm());
        }, 72);
    }

    // Stop reels sequentially
    const stopAt = [900, 1450, 2000];
    for (let c = 0; c < 3; c++) {
        (col => setTimeout(() => {
            clearInterval(ivals[col]);
            const reel = $(`reel-${col}`);
            reel.classList.remove('spinning');

            setCell(col, 0, grid[col][0]);
            setCell(col, 1, grid[col][1]);
            setCell(col, 2, grid[col][2]);

            reel.classList.add('landing');
            reel.addEventListener('animationend', () => reel.classList.remove('landing'), { once: true });

            if (col === 2) setTimeout(() => resolve(mid), 280);
        }, stopAt[col]))(c);
    }
}

/* ── Resolve win/loss ──────────────────────────────────────────────────── */
function resolve(mid) {
    const allSame = mid[0] === mid[1] && mid[1] === mid[2];

    if (!allSame) {
        showResult('未中獎', 'lose');
    } else {
        setWinHighlight(true);
        const sym = mid[0];

        if (sym === 'seven') {
            setCredits(credits + bet + 300);   // return bet + 300 bonus
            if (Math.random() < 0.5) {
                showResult('🎉 777 大獎！+300 點  ★ 觸發 Bonus！', 'jackpot');
                setTimeout(openBonusGame, 900);
            } else {
                showResult('🎉 777 大獎！  +300 點', 'jackpot');
            }
        } else {
            const gain = Math.floor(bet * NET_MULT[sym]);
            setCredits(credits + bet + gain);  // return bet + gain
            const e = SYM[sym].html;           // emoji string (no HTML tags for these)
            showResult(`${e}${e}${e}  +${gain} 點`, 'win');
        }
    }

    if (credits === 0) {
        setTimeout(() => showResult('點數歸零！重新整理以重玩', 'lose'), 1200);
    }

    spinning = false;
    $('spin-btn').disabled = false;
}

/* ── Bonus Game ────────────────────────────────────────────────────────── */
function openBonusGame() {
    const sysEl    = $('bonus-sys-num');
    const playerEl = $('bonus-player-num');
    const resultEl = $('bonus-result-msg');
    const drawBtn  = $('bonus-draw-btn');
    const closeBtn = $('bonus-close-btn');

    sysEl.textContent    = '???';
    playerEl.textContent = '???';
    sysEl.className      = 'bonus-card-num hidden-num';
    playerEl.className   = 'bonus-card-num hidden-num';
    resultEl.textContent = '';
    resultEl.className   = 'bonus-result-msg';
    drawBtn.disabled     = false;
    drawBtn.style.display = 'block';
    closeBtn.classList.remove('visible');

    $('bonus-overlay').classList.add('active');
    $('spin-btn').disabled = true;

    drawBtn.onclick = () => {
        drawBtn.disabled = true;
        const sysNum    = Math.floor(Math.random() * 100) + 1;
        const playerNum = Math.floor(Math.random() * 100) + 1;

        // Reveal with short counting animation
        let tick = 0;
        const interval = setInterval(() => {
            sysEl.textContent    = Math.floor(Math.random() * 100) + 1;
            playerEl.textContent = Math.floor(Math.random() * 100) + 1;
            tick++;
            if (tick >= 18) {
                clearInterval(interval);
                sysEl.textContent    = sysNum;
                playerEl.textContent = playerNum;
                sysEl.className      = 'bonus-card-num sys-num';
                playerEl.className   = 'bonus-card-num player-num';

                setTimeout(() => {
                    if (playerNum > sysNum) {
                        setCredits(credits + 1000);
                        resultEl.textContent = '🏆 玩家獲勝！  +1000 點';
                        resultEl.className   = 'bonus-result-msg bonus-win';
                    } else {
                        resultEl.textContent = '系統獲勝，再接再厲！';
                        resultEl.className   = 'bonus-result-msg bonus-lose';
                    }
                    drawBtn.style.display = 'none';
                    closeBtn.classList.add('visible');
                }, 220);
            }
        }, 60);
    };

    closeBtn.onclick = () => {
        $('bonus-overlay').classList.remove('active');
        $('spin-btn').disabled = false;
    };
}

/* ── Init ──────────────────────────────────────────────────────────────── */
function initReels() {
    for (let c = 0; c < 3; c++) {
        setCell(c, 0, randAny());
        setCell(c, 1, randNorm());
        setCell(c, 2, randAny());
    }
}

document.querySelectorAll('.bet-btn').forEach(btn =>
    btn.addEventListener('click', () => {
        if (spinning) return;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        bet = +btn.dataset.bet;
    })
);

$('spin-btn').addEventListener('click', spin);

initReels();
</script>
